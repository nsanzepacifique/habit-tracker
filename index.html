<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Habits | Natural Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="habit-container">
        <header>
            <h1>Daily Habits</h1>
            <p>One step at a time.</p>
            
            <div class="progress-wrapper">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="percentage-label"><span id="percentNum">0</span>% Complete</div>
        </header>

        <div class="habit-list">
            <label class="habit-item">
                <input type="checkbox" class="habit-checkbox">
                <span class="custom-check"></span>
                <span class="habit-text">Ship a GitHub Commit</span>
            </label>

            <label class="habit-item">
                <input type="checkbox" class="habit-checkbox">
                <span class="custom-check"></span>
                <span class="habit-text">Deep Work Session (1hr)</span>
            </label>

            <label class="habit-item">
                <input type="checkbox" class="habit-checkbox">
                <span class="custom-check"></span>
                <span class="habit-text">Read Tech Documentation</span>
            </label>

            <label class="habit-item">
                <input type="checkbox" class="habit-checkbox">
                <span class="custom-check"></span>
                <span class="habit-text">Drink 2L of Water</span>
            </label>

            <label class="habit-item">
                <input type="checkbox" class="habit-checkbox">
                <span class="custom-check"></span>
                <span class="habit-text">Offline / Meditation</span>
            </label>
        </div>

        <button class="clear-btn" id="resetBtn">Reset List</button>
    </div>

    <script>
        const checkboxes = document.querySelectorAll('.habit-checkbox');
        const progressFill = document.getElementById('progressFill');
        const percentNum = document.getElementById('percentNum');
        const resetBtn = document.getElementById('resetBtn');

        function updateProgress() {
            const total = checkboxes.length;
            const checked = document.querySelectorAll('.habit-checkbox:checked').length;
            const percentage = Math.round((checked / total) * 100);
            
            progressFill.style.width = percentage + "%";
            percentNum.innerText = percentage;
        }

        // Add event listeners to all checkboxes
        checkboxes.forEach(box => {
            box.addEventListener('change', updateProgress);
        });

        // Reset functionality
        resetBtn.addEventListener('click', () => {
            checkboxes.forEach(box => box.checked = false);
            updateProgress();
        });
    </script>
</body>
</html>

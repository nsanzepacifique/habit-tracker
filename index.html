<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Manrope:wght@400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar">

    <div class="left">
        <div class="title">Daily Dashboard</div>
        <div class="sub">Stay consistent</div>
    </div>

    <div class="right">
        <button onclick="show('today')">Today</button>
        <button onclick="show('stats')">Stats</button>
        <button onclick="show('settings')">Settings</button>
        <div id="clock"></div>
    </div>

</nav>

<div class="container">

<section id="today" class="section active">
    <div class="card">
        <h1>Today</h1>

        <div class="bar">
            <div id="fill"></div>
        </div>

        <p><span id="percent">0</span>% Complete</p>

        <label><input type="checkbox" onchange="update()"> Code</label>
        <label><input type="checkbox" onchange="update()"> Study</label>
        <label><input type="checkbox" onchange="update()"> Workout</label>
        <label><input type="checkbox" onchange="update()"> Read</label>

        <button onclick="resetAll()">Reset</button>
    </div>
</section>

<section id="stats" class="section">
    <div class="card">
        <h1>Stats</h1>
        <p>Completed:</p>
        <h2 id="count">0</h2>
    </div>
</section>

<section id="settings" class="section">
    <div class="card">
        <h1>Settings</h1>
        <p>Coming soon</p>
    </div>
</section>

</div>

<script>
setInterval(() => {
    document.getElementById("clock").innerText =
    new Date().toLocaleTimeString();
}, 1000);

function show(id){
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function update(){
    const boxes = document.querySelectorAll("input[type=checkbox]");
    const checked = document.querySelectorAll("input[type=checkbox]:checked").length;

    const percent = Math.round((checked / boxes.length) * 100);

    document.getElementById("percent").innerText = percent;
    document.getElementById("fill").style.width = percent + "%";
    document.getElementById("count").innerText = checked;
}

function resetAll(){
    document.querySelectorAll("input[type=checkbox]").forEach(b => b.checked = false);
    update();
}
</script>

</body>
</html>
